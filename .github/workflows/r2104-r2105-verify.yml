name: Verify R2104D and R2105D

on:
  push:
    branches:
      - codex/r2104-r2105-verify
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Lean and Mathlib cache
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: true

      - name: Build R2104D
        run: lake build R2104DLeanCanonicalLiPhaseInverse

      - name: Check R2104D implementation and axioms
        run: |
          lake env lean R2104DLeanCanonicalLiPhaseInverse/CanonicalLiPhaseInverse.lean
          lake env lean R2104DLeanCanonicalLiPhaseInverse/CanonicalLiPhaseInverseDependencyAudit.lean

      - name: Build R2105D
        run: lake build R2105DLeanActualLiAbelWeight

      - name: Check R2105D implementation and axioms
        run: |
          lake env lean R2105DLeanActualLiAbelWeight/ActualLiAbelWeight.lean
          lake env lean R2105DLeanActualLiAbelWeight/ActualLiAbelWeightDependencyAudit.lean

      - name: Integrated two-layer build
        run: lake build R2104DLeanCanonicalLiPhaseInverse R2105DLeanActualLiAbelWeight

      - name: Integrity checks
        shell: bash
        run: |
          if grep -R -n -E '\b(sorry|admit|unsafe|axiom)\b' \
            R2104DLeanCanonicalLiPhaseInverse.lean \
            R2104DLeanCanonicalLiPhaseInverse \
            R2105DLeanActualLiAbelWeight.lean \
            R2105DLeanActualLiAbelWeight; then
            exit 1
          fi
          git diff --check HEAD^
