name: Codex R2106D R2107D verification
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - codex/r2106-r2107-boundary-density

jobs:
  targeted:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          use-mathlib-cache: true
      - name: Build all default targets
        run: lake build
      - name: Check implementation modules directly
        run: |
          lake env lean R2106DLeanFiniteLiBoundaryIntegration/FiniteLiBoundaryIntegration.lean
          lake env lean R2107DLeanSmoothZeroCountingDensity/SmoothZeroCountingDensity.lean
      - name: Check integrated Main
        run: lake env lean Main.lean
      - name: Integrity audit
        run: |
          ! rg -n '(^|[^[:alnum:]_])(sorry|admit|unsafe|axiom)([^[:alnum:]_]|$)' \
            R2106DLeanFiniteLiBoundaryIntegration.lean \
            R2106DLeanFiniteLiBoundaryIntegration \
            R2107DLeanSmoothZeroCountingDensity.lean \
            R2107DLeanSmoothZeroCountingDensity
